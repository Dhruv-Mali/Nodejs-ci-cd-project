name: Node.js CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: CI — Install & Test
  # ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if any)
        run: npm test --if-present

  # ─────────────────────────────────────────
  # JOB 2: CD — Deploy to Server via SSH
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build   # build pass hoga tabhi deploy chalega

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 2222                         
          script: |
            cd /var/www/Nodejs-ci-cd-project        # 👈 apna server path yahan change karo
            git pull origin main
            npm ci --production
            pm2 restart all || pm2 start npm --name "nodejs-app" -- start
            pm2 save
